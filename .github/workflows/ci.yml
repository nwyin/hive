name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NO_COLOR: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uvx ruff check src/ tests/
      - run: uvx ruff format --check src/ tests/
      - run: uv run pytest tests/ -v --timeout=30

  mutate:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nwyin/irradiate@v0
        with:
          diff: origin/main
          sample: "0.1"
          fail-under: "60"
          extra-args: "--timeout-multiplier 5"
