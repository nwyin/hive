repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        args: [--check]
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check src
        language: system
        pass_filenames: false
